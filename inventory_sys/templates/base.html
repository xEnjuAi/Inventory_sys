{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet" />
</head>
<body class="bg-gray-50">

<nav class="bg-white border-b border-gray-200 fixed z-30 w-full top-0 start-0">
    <div class="px-3 py-3 lg:px-5 lg:pl-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center justify-start rtl:justify-end">
          <a href="#" class="flex ms-2 md:mr-24">
            <img src="https://flowbite.com/docs/images/logo.svg" class="h-8 me-3" alt="FlowBite Logo" />
            <span class="self-center text-xl font-semibold sm:text-2xl whitespace-nowrap text-blue-600">Flowbite</span>
          </a>
        </div>
        <div class="flex items-center">
            <div class="flex items-center ms-3">
              <div>
                <button type="button" class="flex text-sm bg-gray-800 rounded-full focus:ring-4 focus:ring-gray-300">
                  <span class="sr-only">Open user menu</span>
                  <img class="w-8 h-8 rounded-full" src="https://flowbite.com/docs/images/people/profile-picture-5.jpg" alt="user photo">
                </button>
              </div>
            </div>
        </div>
      </div>
    </div>
</nav>

<aside id="logo-sidebar" class="fixed top-0 left-0 z-20 w-64 h-screen pt-20 transition-transform -translate-x-full bg-white border-r border-gray-200 sm:translate-x-0" aria-label="Sidebar">
   <div class="h-full px-3 pb-4 overflow-y-auto bg-white font-medium">
      <ul class="space-y-2 font-medium">
            <li>
               <a href="{% url 'inventory_list' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
                  <span class="ms-3">Inventory</span>
               </a>
            </li>
            <li>
               <a href="{% url 'add_inventory' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
                  <span class="ms-3">Add Inventory</span>
               </a>
            </li>
            <li>
               <a href="{% url 'brand_list' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
                  <span class="ms-3">Brand List</span>
               </a>
            </li>
            <li>
               <a href="{% url 'add_brand' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
                  <span class="ms-3">Add Brand</span>
               </a>
            </li>
         <li>
            <a href="{% url 'item_type_list' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
               <span class="ms-3">Item Type List</span>
            </a>
         </li>
         <li>
            <a href="{% url 'add_item_type' %}" class="flex items-center p-2 text-gray-900 rounded-lg hover:bg-gray-100">
               <span class="ms-3">Add Item Type</span>
            </a>
         </li>
      </ul>
   </div>
</aside>

<div class="p-4 sm:ml-64 pt-24">
   
   {% include 'include/ToastMessage.html' %}

   {% block content %}
   {% endblock %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>

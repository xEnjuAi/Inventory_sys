{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg bg-white p-8 rounded-lg mt-2 shadow-md">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Add New Brand</h2>

    <form method="POST" action="{% url 'add_brand' %}">
        {% csrf_token %}
        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium text-gray-900">Brand Name</label>
            <input type="text" name="brand" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="e.g. Nike, Adidas" required>
        </div>
        
        <div class="flex justify-end mt-4">
            <button type="submit" class="text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm px-6 py-2.5 text-center">Save Brand </button>
        </div>
    </form>
</div>
{% endblock %}
